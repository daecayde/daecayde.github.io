<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity & Beyond</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff0054;
            --accent-glow: rgba(255, 0, 84, 0.5);
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            font-family: 'Outfit', sans-serif;
            background: #02010a;
            color: white;
            overflow-x: hidden;
            transition: background 2s ease;
        }

        /* Dynamic Time-Based Overlay */
        #time-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            transition: 2s;
        }

        #cursor {
            width: 15px; height: 15px;
            background: white;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s;
        }

        section { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 60px;
            text-align: center;
            max-width: 900px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }

        .time-greeting {
            font-family: 'Dancing Script', cursive;
            font-size: 5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-container {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 20px;
            min-width: 180px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-value { font-weight: 900; color: var(--pink); font-size: 1.4rem; display: block; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; }

        .glow-btn {
            background: white;
            color: black;
            padding: 20px 50px;
            border-radius: 100px;
            border: none;
            font-weight: 900;
            margin-top: 50px;
            letter-spacing: 2px;
            transition: 0.4s;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        .glow-btn:hover { transform: scale(1.05); box-shadow: 0 0 50px var(--pink); background: var(--pink); color: white; }

        /* Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000;
            justify-content: center; align-items: center;
            backdrop-filter: blur(15px);
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="time-overlay"></div>

    <section id="main">
        <div class="glass-panel">
            <p id="system-status" style="font-family: monospace; font-size: 0.7rem; color: var(--pink); margin-bottom: 20px; letter-spacing: 3px;">
                STATUS: PROTECTING_SHRAVANI // STABILITY: 100%
            </p>
            
            <h1 class="time-greeting" id="greeting">Good Moments</h1>
            
            <p id="reassurance-text" style="font-size: 1.2rem; opacity: 0.8; line-height: 1.8;">
                I am here. I am staying. And I am choosing you every single second.
            </p>

            <div class="stats-container">
                <div class="stat-card">
                    <span class="stat-value" id="love-count">0</span>
                    <span class="stat-label">Love Intensity</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="clock">00:00:00</span>
                    <span class="stat-label">Our Current Time</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value">PERMANENT</span>
                    <span class="stat-label">Contract Status</span>
                </div>
            </div>

            <button class="glow-btn" onclick="openModal()">OPEN THE VAULT</button>
        </div>
    </section>

    <div id="modal" class="modal">
        <div style="text-align:center;">
            <h2 id="mText" style="font-size: 3rem; margin-bottom: 30px;">I'm never letting you go.</h2>
            <button class="glow-btn" onclick="document.getElementById('modal').style.display='none'">I feel safe now ❤️</button>
        </div>
    </div>

    <script>
        // Custom Cursor
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Love Meter Logic
        let love = 999999999999;
        setInterval(() => {
            love += Math.floor(Math.random() * 1000);
            document.getElementById('love-count').innerText = love.toLocaleString();
        }, 10);

        // Time-Aware UI Logic
        function updateTimeAwareness() {
            const now = new Date();
            const hours = now.getHours();
            const greeting = document.getElementById('greeting');
            const overlay = document.getElementById('time-overlay');
            const status = document.getElementById('reassurance-text');
            
            // Format Clock
            document.getElementById('clock').innerText = now.toLocaleTimeString();

            // Morning (5am - 12pm)
            if (hours >= 5 && hours < 12) {
                greeting.innerText = "Good Morning, My Sun";
                overlay.style.background = "radial-gradient(circle at top, #ff9a9e 0%, #02010a 100%)";
                status.innerText = "Wake up knowing you are the most loved person on this planet. Today, tomorrow, and every morning after—I am yours.";
            } 
            // Afternoon (12pm - 5pm)
            else if (hours >= 12 && hours < 17) {
                greeting.innerText = "Good Afternoon, Beautiful";
                overlay.style.background = "radial-gradient(circle at top, #84fab0 0%, #02010a 100%)";
                status.innerText = "Even in the middle of a busy day, you are the only thing on my mind. I'm right here, anchored to you.";
            }
            // Evening (5pm - 9pm)
            else if (hours >= 17 && hours < 21) {
                greeting.innerText = "Good Evening, My Peace";
                overlay.style.background = "radial-gradient(circle at top, #a18cd1 0%, #02010a 100%)";
                status.innerText = "The day is winding down, but my commitment to you is only getting stronger. Rest easy knowing I've got you.";
            }
            // Night (9pm - 5am)
            else {
                greeting.innerText = "Good Night, My Everything";
                overlay.style.background = "radial-gradient(circle at top, #302b63 0%, #02010a 100%)";
                status.innerText = "Close your eyes and let go of the overwhelm. I am your safety net. I will be here when you wake up, and every night after.";
            }
        }

        setInterval(updateTimeAwareness, 1000);
        updateTimeAwareness();

        function openModal() { document.getElementById('modal').style.display = 'flex'; }
    </script>
</body>
</html>
