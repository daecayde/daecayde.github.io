<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        body {
            background-color: #121212;
            color: #d4af37; /* A subtle golden hue */
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 1px solid #d4af37;
            padding: 50px;
            border-radius: 8px;
            background-color: #1e1e1e;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2em;
            margin-top: 20px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>I love you.</h1>
        <p>Our vibe is absolutely unmatched.</p>
        <p>I know it's a rune and not a ring, but you can have my greatest one. 💛</p>
    </div>
</body>
</html>
