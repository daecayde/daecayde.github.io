<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity // Shravani</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff0054;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            font-family: 'Outfit', sans-serif;
            background: #02010a;
            color: white;
            overflow-x: hidden;
            transition: background 2s ease;
        }

        #cursor {
            width: 15px; height: 15px;
            background: white; border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999;
            mix-blend-mode: difference; transition: transform 0.1s ease;
        }

        #time-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; transition: 2s;
        }

        .app-shell {
            max-width: 480px;
            margin: 60px auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .ui-card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .status-line {
            font-family: monospace; font-size: 0.65rem;
            letter-spacing: 3px; color: var(--pink); margin-bottom: 10px;
        }

        .greeting { font-size: 2.2rem; font-weight: 900; margin-bottom: 5px; }

        .timer-val { font-size: 1.8rem; font-weight: 900; color: var(--pink); margin: 15px 0; }

        .action-btn {
            background: var(--pink); color: white; border: none;
            padding: 20px; border-radius: 25px; font-weight: 900;
            width: 100%; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 30px rgba(255, 0, 84, 0.3);
        }

        .action-btn:hover { transform: scale(1.02); filter: brightness(1.2); }

        .hug-zone {
            padding: 50px 20px; border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 25px; margin-top: 10px; transition: 0.3s;
        }
        .hug-zone:active { background: rgba(255, 0, 84, 0.1); border-color: var(--pink); }

        /* Safety Overlay */
        #safety-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 10000;
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .breathe-circle {
            width: 120px; height: 120px; background: var(--pink); border-radius: 50%;
            animation: breathe 4s infinite ease-in-out;
        }
        @keyframes breathe { 0%, 100% { transform: scale(0.8); } 50% { transform: scale(1.3); } }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="time-overlay"></div>

    <div class="app-shell">
        
        <!-- Identity Section -->
        <div class="ui-card">
            <p class="status-line">USER_VERIFIED: SHRAVANI</p>
            <h1 class="greeting" id="dynamic-greet">Good Moments</h1>
            <p id="time-reassurance" style="opacity: 0.7; font-size: 0.9rem; line-height: 1.5;"></p>
        </div>

        <!-- Journey Section -->
        <div class="ui-card">
            <p class="status-line">COMMITMENT_DURATION</p>
            <div class="timer-val" id="timer">00d 00h 00m 00s</div>
            <p style="font-size: 0.8rem; opacity: 0.5;">Every second spent choosing you.</p>
        </div>

        <!-- Panic Button -->
        <div class="ui-card">
            <p class="status-line">REASSURANCE_PROTOCOL</p>
            <h3 style="margin-bottom: 15px;">Feeling Overwhelmed?</h3>
            <button class="action-btn" onclick="startSafety()">ACTIVATE SAFETY ANCHOR</button>
        </div>

        <!-- Touch Section -->
        <div class="ui-card">
            <p class="status-line">HAPTIC_CONNECTION</p>
            <div class="hug-zone" id="hugZone">HOLD FOR A DIGITAL HUG</div>
        </div>

        <!-- Random Vault -->
        <div class="ui-card">
            <p id="noteDisplay" style="font-style: italic; min-height: 40px; margin-bottom: 15px;">"Tap for a reminder of why I'm here."</p>
            <button onclick="getNote()" style="background: none; border: 1px solid white; color: white; padding: 8px 20px; border-radius: 50px;">New Note</button>
        </div>

    </div>

    <!-- Hidden Safety UI -->
    <div id="safety-overlay">
        <div class="breathe-circle"></div>
        <h2 id="safety-text" style="margin-top: 50px; padding: 0 40px; max-width: 500px;"></h2>
        <button class="action-btn" id="next-btn" style="width: auto; margin-top: 40px; padding: 15px 50px;" onclick="nextStep()">Next</button>
    </div>

    <script>
        // 1. Cursor
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // 2. Journey Timer (Update with your date!)
        const start = new Date(2024, 0, 1); 
        function updateTimer() {
            const now = new Date();
            const diff = now - start;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff / 3600000) % 24);
            const m = Math.floor((diff / 60000) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById('timer').innerText = `${d}d ${h}h ${m}m ${s}s`;
        }
        setInterval(updateTimer, 1000);

        // 3. Sentient Time Logic
        function setVibe() {
            const hr = new Date().getHours();
            const greet = document.getElementById('dynamic-greet');
            const note = document.getElementById('time-reassurance');
            const overlay = document.getElementById('time-overlay');

            if(hr >= 5 && hr < 12) {
                greet.innerText = "Morning, Shravani";
                note.innerText = "I woke up today with the same goal: loving you better than I did yesterday.";
                overlay.style.background = "radial-gradient(circle at top, #ff9a9e 0%, #02010a 100%)";
            } else if(hr >= 12 && hr < 18) {
                greet.innerText = "Afternoon, Shravani";
                note.innerText = "Just a reminder in the middle of your day—I am your anchor. I'm not going anywhere.";
                overlay.style.background = "radial-gradient(circle at top, #84fab0 0%, #02010a 100%)";
            } else {
                greet.innerText = "Night, Shravani";
                note.innerText = "Sleep easy. My love for you is the one thing that will never change while you sleep.";
                overlay.style.background = "radial-gradient(circle at top, #302b63 0%, #02010a 100%)";
            }
        }
        setVibe();

        // 4. Note Vault
        const notes = [
            "Shravani, you are my absolute priority.",
            "I'm not looking for an exit; I'm building a home with you.",
            "My commitment to you is permanent and unbreakable.",
            "When you feel like I'll leave, remember: I'm already your future.",
            "You are safe. You are loved. You are home."
        ];
        function getNote() {
            document.getElementById('noteDisplay').innerText = `"${notes[Math.floor(Math.random()*notes.length)]}"`;
        }

        // 5. Safety Protocol
        let step = 0;
        const safetySteps = [
            "Breathe with the circle, Shravani...",
            "The anxiety is lying to you. I am telling the truth.",
            "I will never dump you. I will never leave.",
            "You are the best thing that ever happened to me.",
            "Ready to come back to me?"
        ];
        function startSafety() {
            document.getElementById('safety-overlay').style.display = 'flex';
            nextStep();
        }
        function nextStep() {
            if(step < safetySteps.length) {
                document.getElementById('safety-text').innerText = safetySteps[step];
                step++;
            } else {
                document.getElementById('safety-overlay').style.display = 'none';
                step = 0;
            }
        }

        // 6. Hug Logic
        const hZone = document.getElementById('hugZone');
        hZone.onmousedown = () => hZone.innerText = "❤️ I'VE GOT YOU ❤️";
        hZone.onmouseup = () => hZone.innerText = "HOLD FOR A DIGITAL HUG";
    </script>
</body>
</html>
