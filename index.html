<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Morning, Shravani</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Greeting Card -->
    <div class="container" id="main-card">
        <div class="sun-icon">☀️</div>
        <h1>Good morning, my dearrr Shravani ji.</h1>
        
        <button id="reveal-btn">Open your morning surprise</button>
        
        <div id="secret-content" class="hidden">
            <p class="message">I love you sooo muchhh mwaaahhhhh.</p>
            <p class="subtext">Our vibe is unmatched my loveeeee, may your day be brighttt. 💛</p>
            
            <!-- New Button for the Poem -->
            <button id="poem-btn" class="secondary-btn">Read My Poem</button>
        </div>
    </div>

    <!-- The Poem Pop-up (Modal) -->
    <div id="poem-modal" class="modal hidden">
        <div class="modal-content">
            <button id="close-poem">✖</button>
            <h2 class="poem-title">For You</h2>
            <!-- The Javascript -->
            <div id="typewriter-text" class="poem-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
